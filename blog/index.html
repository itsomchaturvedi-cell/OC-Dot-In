<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Om Chaturvedi</title>
  <meta name="description" content="Articles by Om Chaturvedi on entrepreneurship, EdTech, and building businesses." />
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">Om Chaturvedi</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav" id="siteNav">
        <a href="../index.html#about">About</a>
        <a href="../index.html#businesses">Businesses</a>
        <a href="../index.html#vision">Vision</a>
        <a href="index.html">Blog</a>
        <a href="../index.html#contact" class="nav-cta">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="blog-header">
      <div class="container">
        <h1>Blog</h1>
        <p>Notes on entrepreneurship, EdTech, and building businesses from Mumbai — new articles posting soon.</p>
      </div>
    </section>

    <section class="container">
      <div id="postList" class="blog-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> Om Chaturvedi. All rights reserved.</p>
      <a href="../index.html">Home</a>
    </div>
  </footer>

  <script src="../assets/js/posts.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    const listEl = document.getElementById("postList");

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }

    if (!posts || posts.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <strong>No posts yet</strong>
          New articles are coming soon — check back shortly.
        </div>
      `;
    } else {
      const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
      listEl.innerHTML = sorted
        .map(
          (post) => `
        <a class="post-card" href="${post.url}">
          <span class="post-date">${formatDate(post.date)}</span>
          <h2 class="post-title">${post.title}</h2>
          <p class="post-excerpt">${post.excerpt}</p>
        </a>
      `
        )
        .join("");
    }
  </script>
</body>
</html>
